name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to Google Play internal testing'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Play upload keystore (optional)
        if: env.UPLOAD_KEYSTORE_BASE64 != ''
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          {
            echo "UPLOAD_KEYSTORE_PATH=$RUNNER_TEMP/upload.keystore"
            echo "UPLOAD_KEYSTORE_PASSWORD=${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}"
            echo "UPLOAD_KEY_ALIAS=${{ secrets.UPLOAD_KEY_ALIAS }}"
            echo "UPLOAD_KEY_PASSWORD=${{ secrets.UPLOAD_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Set Play version code
        # Play requires a strictly increasing versionCode; offset keeps CI
        # codes above the manually-uploaded baseline (19).
        run: echo "VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"

      - name: Build debug APK and release bundle
        run: ./gradlew --no-daemon assembleDebug bundleRelease

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk shelfie-debug.apk
          cp app/build/outputs/bundle/release/app-release.aab shelfie-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelfie-debug-apk
          path: shelfie-debug.apk

      - name: Upload Play bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelfie-release-aab
          path: shelfie-release.aab

      - name: Publish to Google Play internal testing
        # Runs on tag pushes and on manual dispatch with publish=true. The
        # bundle is signed by the shared keystore (or the private upload key
        # when its secrets are set) — the same key past Play uploads used.
        if: >-
          env.PLAY_SERVICE_ACCOUNT_JSON != '' &&
          (startsWith(github.ref, 'refs/tags/') || inputs.publish)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shelfie.zbuddy
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Publishes a release for the pushed tag (e.g. v0.9.0).
          name: ${{ github.ref_name }}
          body: |
            Built from tag `${{ github.ref_name }}`.
            Download `shelfie-debug.apk` below and sideload it on your device.
            `shelfie-release.aab` is the Google Play upload bundle.
          files: |
            shelfie-debug.apk
            shelfie-release.aab
