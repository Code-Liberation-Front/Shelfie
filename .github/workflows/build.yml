name: Build APK

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk shelfie-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelfie-debug-apk
          path: shelfie-debug.apk

      - name: Publish rolling release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Automatically built from the latest commit on the default branch.
            Download `shelfie-debug.apk` below and sideload it on your device.
          files: shelfie-debug.apk
